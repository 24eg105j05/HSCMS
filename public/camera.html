<!DOCTYPE html>
<html>
<head>

<title>Camera Logs</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark">

<div class="container">

<a class="navbar-brand">Smart City Security System</a>

<div>

<a href="dashboard.html" class="btn btn-outline-light me-2">Dashboard</a>
<a href="sensor.html" class="btn btn-outline-light me-2">Sensors</a>
<a href="camera.html" class="btn btn-outline-light me-2">Cameras</a>
<a href="network.html" class="btn btn-outline-light">Network</a>

</div>

</div>

</nav>


<div class="container mt-5">

<h2>Camera Logs</h2>

<form id="cameraForm" class="card shadow p-4">

<input id="cameraId" class="form-control mb-3" placeholder="Camera ID">

<input id="location" class="form-control mb-3" placeholder="Location">

<select id="activity" class="form-control mb-3">
<option>Normal</option>
<option>Suspicious Movement</option>
<option>Unauthorized Entry</option>
</select>

<button class="btn btn-success">Submit</button>

</form>


<h3 class="mt-5">Camera Records</h3>

<table class="table table-striped table-hover shadow">

<thead>

<tr>
<th>ID</th>
<th>Camera</th>
<th>Location</th>
<th>Activity</th>
</tr>

</thead>

<tbody id="cameraTable"></tbody>

</table>

</div>


<script>

document.getElementById("cameraForm").addEventListener("submit",async e=>{

e.preventDefault();

await fetch("/camera",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
camera_id:cameraId.value,
location:location.value,
activity:activity.value
})

});

loadCameras();

});


async function loadCameras(){

let res=await fetch("/camera-data");
let data=await res.json();

let table=document.getElementById("cameraTable");

table.innerHTML="";

data.forEach(r=>{

table.innerHTML+=`
<tr>
<td>${r.id}</td>
<td>${r.camera_id}</td>
<td>${r.location}</td>
<td>${r.activity}</td>
</tr>
`;

});

}

loadCameras();

</script>

</body>
</html>
