<!DOCTYPE html>
<html>
<head>

<title>Network Events</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark">

<div class="container">

<a class="navbar-brand">Smart City Security System</a>

<div>

<a href="dashboard.html" class="btn btn-outline-light me-2">Dashboard</a>
<a href="sensor.html" class="btn btn-outline-light me-2">Sensors</a>
<a href="camera.html" class="btn btn-outline-light me-2">Cameras</a>
<a href="network.html" class="btn btn-outline-light">Network</a>

</div>

</div>

</nav>


<div class="container mt-5">

<h2>Network Events</h2>

<form id="networkForm" class="card shadow p-4">

<input id="ip" class="form-control mb-3" placeholder="IP Address">

<input id="event" class="form-control mb-3" placeholder="Event Type">

<select id="level" class="form-control mb-3">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<button class="btn btn-warning">Submit</button>

</form>


<h3 class="mt-5">Network Records</h3>

<table class="table table-striped table-hover shadow">

<thead>

<tr>
<th>ID</th>
<th>IP Address</th>
<th>Event</th>
<th>Threat</th>
</tr>

</thead>

<tbody id="networkTable"></tbody>

</table>

</div>


<script>

async function loadNetworks(){

let res = await fetch("/network-data");

let data = await res.json();

let table = document.getElementById("networkTable");

table.innerHTML = "";

data.forEach(net => {

table.innerHTML += `
<tr>
<td>${net.id}</td>
<td>${net.ip_address}</td>
<td>${net.event_type}</td>
<td>${net.threat_level}</td>
</tr>
`;

});

}


document.getElementById("networkForm").addEventListener("submit", async e => {

e.preventDefault();

await fetch("/network",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

ip_address:document.getElementById("ipAddress").value,
event_type:document.getElementById("eventType").value,
threat_level:document.getElementById("threatLevel").value

})

});

document.getElementById("networkForm").reset();

loadNetworks();

});


loadNetworks();

</script>


</body>
</html>
