<!DOCTYPE html>
<html>
<head>

<title>Sensor Alerts</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark">

<div class="container">

<a class="navbar-brand">Smart City Security System</a>

<div>

<a href="dashboard.html" class="btn btn-outline-light me-2">Dashboard</a>
<a href="sensor.html" class="btn btn-outline-light me-2">Sensors</a>
<a href="camera.html" class="btn btn-outline-light me-2">Cameras</a>
<a href="network.html" class="btn btn-outline-light">Network</a>

</div>

</div>

</nav>


<div class="container mt-5">

<h2>Sensor Alerts</h2>

<form id="sensorForm" class="card shadow p-4">

<input id="sensorId" class="form-control mb-3" placeholder="Sensor ID" required>

<input id="sensorType" class="form-control mb-3" placeholder="Sensor Type">

<select id="alertLevel" class="form-control mb-3">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<button class="btn btn-primary">Submit</button>

</form>


<h3 class="mt-5">Sensor Records</h3>

<table class="table table-striped table-hover shadow">

<thead>

<tr>
<th>ID</th>
<th>Sensor</th>
<th>Type</th>
<th>Alert</th>
</tr>

</thead>

<tbody id="sensorTable"></tbody>

</table>

</div>


<script>

document.getElementById("sensorForm").addEventListener("submit",async e=>{

e.preventDefault();

await fetch("/sensor",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
sensor_id:sensorId.value,
sensor_type:sensorType.value,
alert_level:alertLevel.value
})

});

loadSensors();

});


async function loadSensors(){

let res=await fetch("/sensor-data");
let data=await res.json();

let table=document.getElementById("sensorTable");

table.innerHTML="";

data.forEach(r=>{

table.innerHTML+=`
<tr>
<td>${r.id}</td>
<td>${r.sensor_id}</td>
<td>${r.sensor_type}</td>
<td>${r.alert_level}</td>
</tr>
`;

});

}

loadSensors();

</script>

</body>
</html>
