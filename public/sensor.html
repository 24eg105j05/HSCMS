<!DOCTYPE html>
<html>

<head>

<title>Sensor Alerts</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark">

<div class="container">

<a class="navbar-brand">Smart City Security System</a>

<div>

<a href="dashboard.html" class="btn btn-outline-light me-2">Dashboard</a>
<a href="sensor.html" class="btn btn-outline-light me-2">Sensors</a>
<a href="camera.html" class="btn btn-outline-light me-2">Cameras</a>
<a href="network.html" class="btn btn-outline-light">Network</a>

</div>

</div>

</nav>


<div class="container mt-5">

<h2>Sensor Alerts</h2>

<form id="sensorForm" class="card shadow p-4">

<input id="sensorId" class="form-control mb-3" placeholder="Sensor ID" required>

<input id="sensorType" class="form-control mb-3" placeholder="Sensor Type" required>

<select id="alertLevel" class="form-control mb-3">

<option value="Low">Low</option>
<option value="Medium">Medium</option>
<option value="High">High</option>

</select>

<button class="btn btn-primary">Submit</button>

</form>


<h3 class="mt-5">Sensor Records</h3>

<table class="table table-striped table-hover shadow">

<thead>

<tr>
<th>ID</th>
<th>Sensor</th>
<th>Type</th>
<th>Alert</th>
</tr>

</thead>

<tbody id="sensorTable"></tbody>

</table>

</div>


<script>

async function loadSensors(){

const res = await fetch("/sensor-data");

const data = await res.json();

const table = document.getElementById("sensorTable");

table.innerHTML = "";

data.forEach(sensor => {

table.innerHTML += `
<tr>
<td>${sensor._id.slice(-6)}</td>
<td>${sensor.sensor_id}</td>
<td>${sensor.sensor_type}</td>
<td>${sensor.alert_level}</td>
</tr>
`;

});

}


document.getElementById("sensorForm").addEventListener("submit", async e => {

e.preventDefault();

await fetch("/sensor",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

sensor_id:document.getElementById("sensorId").value,
sensor_type:document.getElementById("sensorType").value,
alert_level:document.getElementById("alertLevel").value

})

});

document.getElementById("sensorForm").reset();

loadSensors();

});


loadSensors();

</script>

</body>
</html>
