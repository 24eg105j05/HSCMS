<!DOCTYPE html>
<html>
<head>

<title>Sensor Alerts</title>
<link rel="stylesheet" href="/css/style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container">

<h1>Sensor Alerts</h1>

<form id="sensorForm">

<input id="sensorId" placeholder="Sensor ID" required>

<input id="sensorType" placeholder="Sensor Type" required>

<select id="alertLevel">

<option value="Low">Low</option>
<option value="Medium">Medium</option>
<option value="High">High</option>

</select>

<button type="submit">Submit</button>

</form>


<h2>Sensor Records</h2>

<table>

<thead>

<tr>
<th>ID</th>
<th>Sensor</th>
<th>Type</th>
<th>Alert</th>
</tr>

</thead>

<tbody id="sensorTable"></tbody>

</table>

</div>

<script>


async function loadSensors(){

let res = await fetch("/sensor-data");

let data = await res.json();

let table = document.getElementById("sensorTable");

table.innerHTML = "";

data.forEach(sensor => {

table.innerHTML += `
<tr>
<td>${sensor.id}</td>
<td>${sensor.sensor_id}</td>
<td>${sensor.sensor_type}</td>
<td>${sensor.alert_level}</td>
</tr>
`;

});

}



document.getElementById("sensorForm").addEventListener("submit", async e => {

e.preventDefault();

await fetch("/sensor",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

sensor_id:document.getElementById("sensorId").value,
sensor_type:document.getElementById("sensorType").value,
alert_level:document.getElementById("alertLevel").value

})

});


document.getElementById("sensorForm").reset();

loadSensors();

});


loadSensors();

</script>

</body>

</html>
